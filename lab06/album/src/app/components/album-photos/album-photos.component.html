<h2>Album Photos</h2>

<div *ngIf="isLoading">Loading photos...</div>

<div class="grid" *ngIf="!isLoading">
  <div class="photo" *ngFor="let photo of photos">
    <img [src]="photo.thumbnailUrl" [alt]="photo.title" />
    <p>{{ photo.title }}</p>
  </div>
</div>

<button (click)="goBack()">Back</button>
